name: HOL Plugin Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: hol-plugin-scanner-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan root plugin bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@fa3cb570a8dd5995536a7d4f78f939a960756acc # v1.2.415, plugin-scanner 2.0.1015
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
          pr_comment: "off"
