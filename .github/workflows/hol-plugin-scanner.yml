name: HOL Plugin Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: hol-plugin-scanner-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan root plugin bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@510f4bbbafb9d1d30b75d205669da40ab3b4f731 # v1.2.415, plugin-scanner 2.0.1015
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
          pr_comment: "off"
